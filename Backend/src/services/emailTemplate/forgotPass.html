<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; border: 1px solid #eee; border-radius: 5px; }
        .otp { font-size: 32px; font-weight: bold; color: #6366f1; letter-spacing: 5px; text-align: center; margin: 20px 0; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Reset Request</h2>
        <p>Hi {{name}},</p>
        <p>We received a request to reset your password. Use the following OTP to proceed:</p>
        <div class="otp">{{otp}}</div>
        <p>This code will expire in 24 hours.</p>
        <p>If you didn't request this, please ignore this email.</p>
        <div class="footer">
            &copy; 2026 Wealth Method. All rights reserved.
        </div>
    </div>
</body>
</html>
